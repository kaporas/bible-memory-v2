<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채점 이력 - 성경암송대회 채점 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C; --gold-light: #E8C97A; --gold-dark: #8B6914;
    --parchment: #F5EDD8; --ink: #1A1208; --ink-mid: #3D2B10; --ink-light: #6B4F2A;
    --correct: #2D6A4F; --correct-bg: #D8F3DC; --wrong: #922B21; --wrong-bg: #FADBD8;
    --pass: #1A5C38; --pass-bg: #C8F5DC; --fail: #7B1D1D; --fail-bg: #FDE8E8;
    --shadow: rgba(26,18,8,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif KR', serif;
    background-color: #1A1208;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(139,26,26,0.07) 0%, transparent 50%);
    min-height: 100vh; color: var(--ink);
  }
  .app-wrapper { max-width: 960px; margin: 0 auto; padding: 20px 16px 80px; }

  .header { text-align: center; padding: 36px 20px 26px; }
  .header::before, .header::after {
    content: ''; display: block; height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 10px auto; width: 70%;
  }
  .header-icon { font-size: 2.2rem; margin-bottom: 6px; filter: drop-shadow(0 0 14px rgba(201,168,76,0.55)); }
  .header h1 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(1.3rem, 4vw, 1.9rem); font-weight: 800;
    color: var(--gold-light); letter-spacing: 0.1em;
    text-shadow: 0 2px 10px rgba(201,168,76,0.3);
  }
  .header p { color: rgba(201,168,76,0.55); font-size: 0.8rem; margin-top: 5px; }
  .header-nav { margin-top: 14px; }
  .header-nav a {
    display: inline-block; color: rgba(201,168,76,0.7); font-size: 0.78rem;
    text-decoration: none; border: 1px solid rgba(201,168,76,0.3);
    padding: 5px 14px; border-radius: 20px; transition: all 0.2s;
  }
  .header-nav a:hover { color: var(--gold-light); border-color: var(--gold); background: rgba(201,168,76,0.08); }

  .card {
    background: var(--parchment); border-radius: 4px;
    border: 1px solid var(--gold-dark);
    box-shadow: 0 4px 28px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.55);
    margin-bottom: 22px; overflow: hidden;
  }
  .card-header {
    background: linear-gradient(135deg, var(--ink) 0%, var(--ink-mid) 100%);
    padding: 13px 22px; border-bottom: 2px solid var(--gold-dark);
    display: flex; align-items: center; gap: 10px;
  }
  .card-header h2 { font-family: 'Nanum Myeongjo', serif; font-size: 0.98rem; color: var(--gold-light); letter-spacing: 0.08em; }
  .card-body { padding: 20px 22px; }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--ink-light);
    font-size: 0.9rem; line-height: 2;
  }

  .history-table { width: 100%; border-collapse: collapse; }
  .history-table th {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-light); padding: 8px 14px; text-align: left;
    border-bottom: 2px solid rgba(201,168,76,0.25);
    background: rgba(201,168,76,0.04);
  }
  .history-table td {
    font-size: 0.85rem; padding: 11px 14px;
    border-bottom: 1px solid rgba(201,168,76,0.12);
    color: var(--ink-mid); vertical-align: middle;
  }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table tr:hover td { background: rgba(201,168,76,0.04); }

  .pass-chip {
    display: inline-block; font-size: 0.7rem; font-weight: 700;
    padding: 2px 10px; border-radius: 10px;
  }
  .pass-chip.pass { background: var(--pass-bg); color: var(--pass); }
  .pass-chip.fail { background: var(--fail-bg); color: var(--fail); }

  .accuracy-bar { display: flex; align-items: center; gap: 8px; }
  .acc-bar-wrap { flex: 1; height: 6px; background: rgba(201,168,76,0.13); border-radius: 3px; min-width: 60px; }
  .acc-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light)); border-radius: 3px; }
  .acc-text { font-family: 'Nanum Myeongjo', serif; font-size: 0.82rem; font-weight: 700; color: var(--gold-dark); white-space: nowrap; }

  .detail-link {
    color: var(--gold-dark); text-decoration: none; font-size: 0.78rem;
    padding: 3px 10px; border: 1px solid rgba(201,168,76,0.4); border-radius: 3px;
    transition: all 0.15s; white-space: nowrap;
  }
  .detail-link:hover { background: rgba(201,168,76,0.1); color: var(--ink); }

  .summary-bar {
    display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
    padding: 12px 16px; margin-bottom: 16px;
    background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.2); border-radius: 3px;
    font-size: 0.78rem; color: var(--ink-light);
  }
  .summary-bar strong { color: var(--gold-dark); font-family: 'Nanum Myeongjo', serif; font-size: 1rem; }

  @media (max-width: 640px) {
    .history-table th:nth-child(3),
    .history-table td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>
<div class="app-wrapper">

  <div class="header">
    <div class="header-icon">✝</div>
    <h1>채점 이력</h1>
    <p>Scripture Memorization · Scoring History</p>
    <div class="header-nav">
      <a th:href="@{/}">← 채점 화면으로</a>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>📋 전체 채점 내역</h2>
    </div>
    <div class="card-body">

      <!-- 요약 통계 -->
      <div class="summary-bar" th:if="${!sessions.isEmpty()}">
        <span>총 채점 횟수: <strong th:text="${sessions.size()}">0</strong>회</span>
        <span>합격:
          <strong th:text="${sessions.?[passed].size()}">0</strong>명
        </span>
        <span>불합격:
          <strong th:text="${sessions.?[!passed].size()}">0</strong>명
        </span>
      </div>

      <!-- 데이터 없을 때 -->
      <div class="empty-state" th:if="${sessions.isEmpty()}">
        📝 아직 채점 기록이 없습니다.<br>
        <a th:href="@{/}" style="color: var(--gold-dark); text-decoration: none; font-weight: 700;">채점하러 가기 →</a>
      </div>

      <!-- 이력 테이블 -->
      <table class="history-table" th:if="${!sessions.isEmpty()}">
        <thead>
          <tr>
            <th>참가자</th>
            <th>대회명</th>
            <th>암송 구절</th>
            <th>정확도</th>
            <th>판정</th>
            <th>채점 일시</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="scoreSession : ${sessions}">
            <td>
              <strong th:text="${scoreSession.participantName}">홍길동</strong>
            </td>
            <td th:text="${scoreSession.contestName}">2026년 대회</td>
            <td th:text="${(scoreSession.bibleBook != null ? scoreSession.bibleBook : '') + ' ' + (scoreSession.bibleChapter != null ? scoreSession.bibleChapter : '')}">시편 119편</td>
            <td>
              <div class="accuracy-bar">
                <div class="acc-bar-wrap">
                  <div class="acc-bar-fill"
                       th:style="'width:' + (${scoreSession.accuracy > 100 ? 100 : scoreSession.accuracy}) + '%'"></div>
                </div>
                <span class="acc-text" th:text="${scoreSession.accuracy} + '%'">0%</span>
              </div>
            </td>
            <td>
              <span class="pass-chip"
                    th:classappend="${scoreSession.passed} ? 'pass' : 'fail'"
                    th:text="${scoreSession.passed} ? '합격' : '불합격'">합격</span>
            </td>
            <td th:text="${#temporals.format(scoreSession.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 00:00</td>
            <td>
              <a class="detail-link" th:href="@{/history/{id}(id=${scoreSession.id})}">상세 보기</a>
            </td>
          </tr>
        </tbody>
      </table>

    </div>
  </div>

</div>
</body>
</html>
